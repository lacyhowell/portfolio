<!DOCTYPE html>
<html lang="en">
<head>
    <!-- This page contains the AI-generated version of the contact form. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>AI-Generated Contact Form</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Manual Form</a>
            <a href="contact-ai.html">AI Form</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact Form</h2>

            <p>
                This is the AI-generated version of the contact form used for comparison.
            </p>

            <!-- The AI version also includes labels, fieldsets, and different input types. -->
            <form action="#" method="post" enctype="multipart/form-data">
                <fieldset>
                    <legend>Personal Information</legend>

                    <label for="ai-name">Name *</label>
                    <input type="text" id="ai-name" name="name" required>

                    <label for="ai-email">Email *</label>
                    <input type="email" id="ai-email" name="email" required>

                    <label for="ai-subject">Subject *</label>
                    <input type="text" id="ai-subject" name="subject" required>

                    <label for="ai-message">Message *</label>
                    <textarea id="ai-message" name="message" rows="6" required></textarea>
                </fieldset>

                <fieldset>
                    <legend>Additional Details</legend>

                    <label for="ai-topic">Topic</label>
                    <select id="ai-topic" name="topic">
                        <option value="general">General Question</option>
                        <option value="feedback">Website Feedback</option>
                        <option value="outdoors">Outdoor Activities</option>
                    </select>

                    <label for="ai-date">Preferred Date</label>
                    <input type="date" id="ai-date" name="date">

                    <label for="ai-number">Number of Participants</label>
                    <input type="number" id="ai-number" name="participants" min="1" max="20">

                    <label for="ai-file">Upload a File</label>
                    <input type="file" id="ai-file" name="file">

                    <p>Preferred Contact Method:</p>

                    <label class="choice-label">
                        <input type="radio" name="ai-method" value="email" checked>
                        Email
                    </label>

                    <label class="choice-label">
                        <input type="radio" name="ai-method" value="phone">
                        Phone
                    </label>

                    <label class="choice-label">
                        <input type="checkbox" name="updates">
                        Send Me Updates
                    </label>
                </fieldset>

                <div class="button-group">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Lacy Howell</p>
    </footer>

</body>
</html>
