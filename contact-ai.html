<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><title>Contact Me</title><link rel='stylesheet' href='style.css'></head><body>
<h1>AI Generated Contact Form</h1><a href='index.html'>Home</a>
<form>
<fieldset><legend>Contact Information</legend>
<label>Name:<input type='text' name='name'></label><br>
<label>Email:<input type='email' name='email'></label><br>
<label>Subject:<input type='text' name='subject'></label><br>
<label>Message:<textarea name='message'></textarea></label><br>
<label>Visit Date:<input type='date'></label><br>
<label>Age:<input type='number'></label><br>
<label>Favorite Activity:
<select><option>Hiking</option><option>Camping</option><option>Fishing</option></select></label><br>
<p>Experience:</p>
<label><input type='radio' name='exp'>Beginner</label>
<label><input type='radio' name='exp'>Experienced</label><br>
<label><input type='checkbox'>Subscribe to updates</label><br>
<label>Upload Photo:<input type='file'></label><br>
<input type='submit' value='Submit'>
<input type='reset' value='Reset'>
</fieldset></form></body></html>
