<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Recommendation | Lacy Howell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Contact & Trail Recommendation</h1>
    <p>Send a message and receive a basic hiking suggestion.</p>
    <nav aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="contact.html" aria-current="page">Contact & Recommendation</a>
        <a href="multimedia.html">Multimedia</a>
    </nav>
</header>
<main>
    <section class="card">
        <h2>Contact Form</h2>
        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Submit Message</button>
        </form>
    </section>

    <section class="card">
        <h2>Find a Hiking Recommendation</h2>
        <label for="experience">Select your hiking experience:</label>
        <select id="experience">
            <option value="">Choose one</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
        </select>
        <button type="button" id="recommendButton">Show Recommendation</button>
        <div id="recommendation" class="result" aria-live="polite">Your recommendation will appear here.</div>
    </section>
</main>
<footer><p>&copy; 2026 Lacy Howell</p></footer>

<script>
/*
    Manual JavaScript for Unit 3.
    The selected value is checked with if / else if / else statements.
    A different message is displayed for each experience level.
*/
document.getElementById("recommendButton").addEventListener("click", function () {
    const experience = document.getElementById("experience").value;
    const output = document.getElementById("recommendation");

    if (experience === "beginner") {
        output.textContent = "Start with a short, well-marked trail. Bring water, check the weather, and tell someone where you are going.";
    } else if (experience === "intermediate") {
        output.textContent = "Try a moderate day hike with some elevation gain. Carry a map, extra water, and a basic first-aid kit.";
    } else if (experience === "advanced") {
        output.textContent = "Consider a longer backcountry route, but review permits, navigation needs, weather, and emergency plans first.";
    } else {
        output.textContent = "Please select an experience level before requesting a recommendation.";
    }
});

/* Prevents the practice form from trying to send data to a server. */
document.getElementById("contactForm").addEventListener("submit", function (event) {
    event.preventDefault();
    alert("Thank you! This demonstration form is not connected to a server.");
});
</script>
</body>
</html>
